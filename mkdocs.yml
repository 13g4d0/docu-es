# MkDocs site — publish later to docs.<your-domain>
# Build: .venv/bin/pip install -r requirements-docs.txt && .venv/bin/mkdocs build
# Preview: mkdocs serve -a 0.0.0.0:8000

site_name: Solution documentation
site_description: As-built docs for IdentiaRAG, Open-WebUI, inference gateway, and Hermes Agent
# GitHub Pages (project site): https://<user>.github.io/<repo>/
site_url: https://13g4d0.github.io/docu/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - As-built:
      - Glossary: as-built/glossary.md
      - Repository map: as-built/repo-map.md
      - C4 — System context: as-built/c4-context.md
      - C4 — Containers: as-built/c4-containers.md
      - IdentiaRAG (software): as-built/identiarag-software.md
      - Open-WebUI (software): as-built/open-webui-software.md
      - Open-WebUI routers: as-built/open-webui-routers.md
      - Inference gateway: as-built/inference-gateway.md
      - Hermes Agent: as-built/hermes-agent.md
      - Data & storage: as-built/data-and-storage.md
      - Network & security: as-built/network-security-matrix.md
      - Deployment patterns: as-built/deployment-patterns.md
      - Operations runbook: as-built/operations-runbook.md
      - Observability: as-built/observability.md
      - Request sequences: as-built/sequence-requests.md
  - User guide:
      - Open-WebUI basics: user-guide/open-webui-basics.md
      - Models & gateway: user-guide/models-and-gateway.md
      - IdentiaRAG for analysts: user-guide/identiarag-for-analysts.md
  - Developer:
      - Onboarding: developer/onboarding.md
      - Fork & upstream policy: developer/fork-upstream-policy.md
  - TdR & gap (M3):
      - Hub: tor-gap/index.md
      - TdR executive summary: tor-gap/tdr-executive-summary.md
      - Criteria (dashboard snapshot): tor-gap/criteria-from-dashboard.md
      - Gap workbook: tor-gap/gap-analysis-workbook.md
      - Doc roadmap from gaps: tor-gap/documentation-roadmap-from-gaps.md
      - Organizer notes: tor-gap/organizer-notes.md
  - ADRs:
      - Index: adr/README.md
      - ADR 0001 MkDocs: adr/0001-use-mkdocs-for-docu.md
      - ADR 0002 Gateway: adr/0002-gateway-single-openai-entrypoint.md
      - ADR 0003 Layout: adr/0003-identiarag-openwebui-sibling-layout.md
  - Meta:
      - Publishing site: PUBLISHING.md
      - Internal references: meta/internal-references.md
      - Milestone roadmap: ROADMAP-MILESTONES.md
      - Private repo & push: PRIVATE-REPO-AND-PUSH.md

plugins:
  - search
  - mermaid2
