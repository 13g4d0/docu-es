# Sitio MkDocs — publicar después en docs.<tu-dominio>
# Build: .venv/bin/pip install -r requirements-docs.txt && .venv/bin/mkdocs build
# Vista previa: mkdocs serve -a 0.0.0.0:8000

site_name: Documentación de la solución
site_description: Documentación as-built del servicio RAG, la interfaz web de chat, la pasarela de inferencia y el servicio de agentes
# GitHub Pages (sitio de proyecto, español): https://13g4d0.github.io/docu-es/
site_url: https://13g4d0.github.io/docu-es/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

markdown_extensions:
  # Mermaid nativo en Material (no usar mkdocs-mermaid2 a la vez: entra en conflicto)
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - As-built:
      - Glosario: as-built/glossary.md
      - Mapa de repositorios: as-built/repo-map.md
      - C4 — Contexto del sistema: as-built/c4-context.md
      - C4 — Contenedores: as-built/c4-containers.md
      - Servicio RAG (software): as-built/identiarag-software.md
      - Interfaz web de chat (software): as-built/open-webui-software.md
      - Routers HTTP de la interfaz de chat: as-built/open-webui-routers.md
      - Pasarela de inferencia: as-built/inference-gateway.md
      - Servicio de agentes: as-built/agent-service.md
      - Datos y almacenamiento: as-built/data-and-storage.md
      - Red y seguridad: as-built/network-security-matrix.md
      - Patrones de despliegue: as-built/deployment-patterns.md
      - Runbook operativo: as-built/operations-runbook.md
      - Observabilidad: as-built/observability.md
      - Secuencias de peticiones: as-built/sequence-requests.md
  - Guía de usuario:
      - Uso básico de la interfaz de chat: user-guide/open-webui-basics.md
      - Modelos y pasarela: user-guide/models-and-gateway.md
      - Servicio RAG para analistas: user-guide/identiarag-for-analysts.md
  - Desarrollo:
      - Incorporación: developer/onboarding.md
      - Política de fork y upstream: developer/fork-upstream-policy.md
  - TdR y brechas (M3):
      - Índice: tor-gap/index.md
      - Resumen ejecutivo TdR: tor-gap/tdr-executive-summary.md
      - Criterios (instantánea del tablero): tor-gap/criteria-from-dashboard.md
      - Cuaderno de brechas: tor-gap/gap-analysis-workbook.md
      - Hoja de ruta documental desde brechas: tor-gap/documentation-roadmap-from-gaps.md
      - Notas del organizador: tor-gap/organizer-notes.md
  - ADRs:
      - Índice: adr/README.md
      - ADR 0001 MkDocs: adr/0001-use-mkdocs-for-docu.md
      - ADR 0002 Pasarela: adr/0002-gateway-single-openai-entrypoint.md
      - ADR 0003 Diseño de carpetas: adr/0003-identiarag-openwebui-sibling-layout.md
  - Meta:
      - Publicar el sitio: PUBLISHING.md
      - Referencias internas: meta/internal-references.md
      - Hitos del roadmap: ROADMAP-MILESTONES.md
      - Git y política de push: PRIVATE-REPO-AND-PUSH.md

plugins:
  - search
