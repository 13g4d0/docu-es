# Build MkDocs site on every push (artefact for Pages or download)
name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: MkDocs build
        run: mkdocs build --strict

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/
